apiVersion: apps/v1
kind: Deployment
metadata:
  name: Anonify
  labels:
    app: Anonify
spec:
  replicas: 2
  selector:
    matchLabels:
      app: Anonify
  template:
    metadata:
      labels:
        app: Anonify
    spec:
      containers:
        - name: Anonify
          image: Anonify:latest
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"